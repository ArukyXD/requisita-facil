{% extends "base.html" %}
{% block content %}
<div class="page-heading">
    <div>
        <p class="eyebrow">Cadastro</p>
        <h1>Novo material</h1>
    </div>
</div>

<form method="post" class="panel form-card">
    <label>Código</label>
    <input name="code" required placeholder="MAT-006">

    <label>Descrição</label>
    <input name="description" required placeholder="Ex: Componente da linha">

    <div class="form-grid">
        <div>
            <label>Unidade</label>
            <input name="unit" required placeholder="un, kg, m">
        </div>
        <div>
            <label>Setor</label>
            <input name="sector" required placeholder="Montagem">
        </div>
        <div>
            <label>Consumo por unidade/meta</label>
            <input name="consumption_per_unit" type="number" step="0.01" min="0" required>
        </div>
    </div>

    <button type="submit">Salvar material</button>
</form>
{% endblock %}
