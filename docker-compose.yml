services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: requisita
      POSTGRES_USER: requisita
      POSTGRES_PASSWORD: requisita123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "5000:10000"
    environment:
      SECRET_KEY: dev-secret-key
      DATABASE_URL: postgresql://requisita:requisita123@db:5432/requisita
      PORT: 10000
    depends_on:
      - db

volumes:
  postgres_data:
